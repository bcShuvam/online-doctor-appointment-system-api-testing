info:
  name: create clinics
  type: http
  seq: 11

http:
  method: POST
  url: "{{doctor}}/clinics"
  headers:
    - name: Authorization
      value: Bearer {{doctor_jwt_1}}
  body:
    type: json
    data: |-
      {
        "name": "City Care Clinic",
        "description": "General health services",
        "province": "Bagmati",
        "district": "Kathmandu",
        "city": "Kathmandu",
        "ward": 5,
        "tole": "Baneshwor",
        "address": "Near XYZ Chowk",
        "primary_phone_number": "9800000000",
        "secondary_phone_number": "9811111111",
        "email": "clinic@example.com"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
