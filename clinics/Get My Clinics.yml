http:
  method: GET
  url: "{{doctor}}/clinics/my"
  headers:
    - name: Authorization
      value: Bearer {{doctor_jwt_1}}
    - name: Authorization
      value: Bearer {{doctor_jwt_2}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
