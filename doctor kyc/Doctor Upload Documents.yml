info:
  name: Doctor Upload Documents
  type: http
  seq: 6

http:
  method: POST
  url: "{{doctor}}/doctor-kyc/upload-documents"
  headers:
    - name: Authorization
      value: Bearer {{doctor_jwt_1}}
    - name: Authorization
      value: Bearer {{doctor_jwt_2}}
      disabled: true
  body:
    type: multipart-form
    data:
      - name: document_category_id
        type: text
        value: "1"
      - name: documents
        type: file
        value:
          - /Users/shuvambc/Downloads/Untitled_design-removebg-preview.png
      - name: documents
        type: file
        value:
          - /Users/shuvambc/Downloads/Untitled_design-removebg-preview (1).png
      - name: metadata
        type: text
        value: '{"degree": "MBBS", "year": 2016}'
        disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
