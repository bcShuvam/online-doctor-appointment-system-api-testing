info:
  name: Get my KYC
  type: http
  seq: 1

http:
  method: GET
  url: "{{doctor}}/doctor-kyc/my-kyc"
  headers:
    - name: Authorization
      value: Bearer {{doctor_jwt_1}}
    - name: Authorization
      value: Bearer {{doctor_jwt_2}}
      disabled: true
  body:
    type: json
    data: ""
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
