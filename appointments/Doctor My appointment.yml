info:
  name: Doctor My appointment
  type: http
  seq: 4

http:
  method: GET
  url: "{{doctor}}/appointments/doctor"
  headers:
    - name: Authorization
      value: Bearer {{patient_jwt_1}}
      disabled: true
    - name: Authorization
      value: Bearer {{recptionist_jwt_2}}
      disabled: true
    - name: Authorization
      value: Bearer {{doctor_jwt_1}}
  body:
    type: json
    data: |-
      {
        "reason": "Doctor not available at selected time"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
