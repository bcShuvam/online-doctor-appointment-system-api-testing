info:
  name: Reject appointment
  type: http
  seq: 2

http:
  method: PUT
  url: "{{doctor}}/appointments/reject/2"
  headers:
    - name: Authorization
      value: Bearer {{patient_jwt_1}}
      disabled: true
    - name: Authorization
      value: Bearer {{recptionist_jwt_2}}
  body:
    type: json
    data: |-
      {
        "reason": "Doctor not available at selected time"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
