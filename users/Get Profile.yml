info:
  name: Get Profile
  type: http
  seq: 5

http:
  method: GET
  url: "{{doctor}}/users/profile"
  headers:
    - name: Authorization
      value: Bearer {{admin_jwt}}
      disabled: true
    - name: Authorization
      value: Bearer {{doctor_jwt_1}}
    - name: Authorization
      value: Bearer {{patient_jwt_1}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
