info:
  name: GET Patients
  type: http
  seq: 1

http:
  method: GET
  url: "{{doctor}}/patients?search="
  headers:
    - name: Authorization
      value: Bearer {{admin_jwt}}
  params:
    - name: search
      value: ""
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
